<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c3e50">
  <meta name="app-version" content="2026-03-13.1">
  <title data-i18n="nav.title">Markdown 編輯器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <!-- Vendor CSS -->
  <link rel="stylesheet" href="vendor/easymde.min.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <span class="nav-logo" data-i18n="nav.title">Markdown 編輯器</span>
    </div>
    <div class="nav-actions">
      <!-- Mobile: Edit/Preview toggle -->
      <div class="mode-toggle mobile-only">
        <button id="btn-mode-edit" class="mode-btn active" data-i18n="mode.edit">編輯</button>
        <button id="btn-mode-preview" class="mode-btn" data-i18n="mode.preview">預覽</button>
      </div>
      <!-- Desktop actions -->
      <button id="btn-new" class="nav-btn desktop-only" data-i18n="nav.new" data-i18n-title="nav.new">新增</button>
      <button id="btn-sample" class="nav-btn desktop-only" data-i18n="nav.sample" data-i18n-title="nav.sample">範例</button>
      <button id="btn-open" class="nav-btn" data-i18n="nav.open" data-i18n-title="nav.open">開啟</button>
      <input type="file" id="file-input" accept=".md,.txt,.markdown" style="display:none">
      <button id="btn-download" class="nav-btn" data-i18n="nav.download" data-i18n-title="nav.download">下載</button>
      <!-- Cloud dropdown -->
      <div class="dropdown" id="cloud-dropdown">
        <button class="nav-btn dropdown-toggle" id="btn-cloud" data-i18n-title="nav.cloud" title="雲端"><span data-i18n="nav.cloud">雲端</span> ▾</button>
        <div class="dropdown-menu" id="cloud-menu">
          <button id="btn-cloud-login" data-i18n="nav.cloud.login">Google 登入</button>
          <button id="btn-cloud-open" data-i18n="nav.cloud.open" disabled>從雲端開啟</button>
          <button id="btn-cloud-save" data-i18n="nav.cloud.save" disabled>儲存到雲端</button>
          <hr>
          <button id="btn-cloud-logout" data-i18n="nav.cloud.logout" style="display:none">登出</button>
        </div>
      </div>
      <!-- Language dropdown -->
      <div class="dropdown" id="lang-dropdown">
        <button class="nav-btn dropdown-toggle" id="btn-lang" data-i18n-title="nav.lang.title" title="語言：中文、英文、越南文">🌐 <span data-i18n="nav.lang">語言</span> ▾</button>
        <div class="dropdown-menu" id="lang-menu">
          <button data-lang="zh-TW">繁體中文</button>
          <button data-lang="en">English</button>
          <button data-lang="vi">Tiếng Việt</button>
        </div>
      </div>
      <div class="dropdown" id="typo-dropdown">
        <button class="nav-btn dropdown-toggle desktop-only" id="btn-typo" data-i18n-title="nav.typo.title" title="風格：文字排版風格"><span data-i18n="nav.typo">風格</span> ▾</button>
        <div class="dropdown-menu" id="typo-menu">
          <button data-typo-btn="default"  data-i18n="typo.default">標準</button>
          <button data-typo-btn="reading"  data-i18n="typo.reading">閱讀</button>
          <button data-typo-btn="compact"  data-i18n="typo.compact">緊湊</button>
          <button data-typo-btn="document" data-i18n="typo.document">文件</button>
          <button data-typo-btn="wide"     data-i18n="typo.wide">全寬</button>
        </div>
      </div>
      <!-- Settings button -->
      <button class="nav-btn" id="btn-settings" data-i18n-title="nav.settings.title" title="佈景主題、雲端硬碟帳號">⚙</button>
      <!-- Mobile menu -->
      <button class="nav-btn mobile-only" id="btn-mobile-menu">☰</button>
    </div>
  </nav>

  <!-- Mobile menu drawer -->
  <div id="mobile-drawer" class="mobile-drawer" hidden>
    <button id="md-new" data-i18n="nav.new">新增</button>
    <button id="md-sample" data-i18n="nav.sample">範例</button>
    <button id="md-open" data-i18n="nav.open">開啟檔案</button>
    <button id="md-download" data-i18n="nav.download">下載 .md</button>
    <button id="md-cloud-login" data-i18n="nav.cloud.login">Google 登入</button>
    <button id="md-cloud-open" data-i18n="nav.cloud.open" disabled>從雲端開啟</button>
    <button id="md-cloud-save" data-i18n="nav.cloud.save" disabled>儲存到雲端</button>
    <hr>
    <button id="md-settings">⚙ <span data-i18n="nav.settings">設定</span></button>
    <hr>
    <div class="lang-group">
      <button data-lang="zh-TW">繁體中文</button>
      <button data-lang="en">English</button>
      <button data-lang="vi">Tiếng Việt</button>
    </div>
    <hr>
    <div class="typo-group">
      <span class="drawer-label" data-i18n="nav.typo">字型</span>
      <button data-typo-btn="default"  data-i18n="typo.default">標準</button>
      <button data-typo-btn="reading"  data-i18n="typo.reading">閱讀</button>
      <button data-typo-btn="compact"  data-i18n="typo.compact">緊湊</button>
      <button data-typo-btn="document" data-i18n="typo.document">文件</button>
      <button data-typo-btn="wide"     data-i18n="typo.wide">全寬</button>
    </div>
  </div>

  <!-- TABS BAR -->
  <div class="tabs-bar" id="tabs-bar">
    <div class="tabs-list" id="tabs-list"></div>
    <button class="tab-new-btn" id="btn-tab-new" data-i18n="tabs.new">+ 新增</button>
  </div>

  <!-- MAIN EDITOR AREA -->
  <main class="editor-wrapper" id="editor-wrapper">
    <!-- OUTLINE PANEL（大綱，預設隱藏） -->
    <div id="outline-panel" class="outline-panel">
      <div class="outline-header" data-i18n="outline.title">大綱</div>
      <div class="outline-body" id="outline-body"></div>
    </div>
    <div class="editor-pane" id="editor-pane">
      <textarea id="editor"></textarea>
    </div>
    <div class="preview-pane" id="preview-pane">
      <div class="preview-content" id="preview-content"></div>
    </div>
  </main>

  <!-- Bottom Toolbar (mobile only) -->
  <div id="bottom-toolbar" class="bottom-toolbar mobile-only" role="toolbar" aria-label="格式工具列">
    <button class="btb-btn btb-bold"   id="btb-bold"    title="粗體 (Ctrl+B)">B</button>
    <button class="btb-btn btb-italic" id="btb-italic"  title="斜體 (Ctrl+I)">I</button>
    <button class="btb-btn"            id="btb-heading" title="標題">#</button>
    <button class="btb-btn"            id="btb-ulist"   title="無序清單">≡</button>
    <button class="btb-btn"            id="btb-olist"   title="有序清單">①</button>
    <button class="btb-btn btb-code"   id="btb-code"    title="程式碼">&lt;/&gt;</button>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span id="status-text" class="status-saved" data-i18n="status.saved">已自動儲存</span>
    <span class="status-sep">|</span>
    <span id="status-words"><span data-i18n="status.words">字數</span>: <span id="word-count">0</span></span>
    <span class="status-sep">|</span>
    <span id="status-chars"><span data-i18n="status.chars">字元</span>: <span id="char-count">0</span></span>
    <span class="status-sep">|</span>
    <span id="status-lines"><span data-i18n="status.lines">行數</span>: <span id="line-count">0</span></span>
    <button id="btn-outline" class="status-outline-btn" data-i18n-title="outline.title" title="大綱"></button>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="modal-overlay" hidden>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-header">
        <h2 id="settings-modal-title" data-i18n="settings.title">設定</h2>
        <button class="modal-close" id="btn-settings-close" aria-label="關閉">×</button>
      </div>
      <div class="modal-body">
        <section class="settings-section">
          <h3 data-i18n="settings.theme.title">佈景主題</h3>
          <div class="theme-swatches">
            <button class="theme-swatch" data-theme-btn="purple"   title="Dark Purple"      style="background:#1e1e2e; color:#e0e0f0;">T</button>
            <button class="theme-swatch" data-theme-btn="dark"     title="Dark"             style="background:#0d0d0d; color:#e6edf3;">T</button>
            <button class="theme-swatch" data-theme-btn="light"    title="Light"            style="background:#ffffff; color:#1f2328;">T</button>
            <button class="theme-swatch" data-theme-btn="nord"     title="Nord"             style="background:#2e3440; color:#eceff4;">T</button>
            <button class="theme-swatch" data-theme-btn="solarized" title="Solarized Light" style="background:#fdf6e3; color:#657b83;">T</button>
            <button class="theme-swatch" data-theme-btn="latte"    title="Catppuccin Latte" style="background:#eff1f5; color:#4c4f69;">T</button>
            <button class="theme-swatch" data-theme-btn="rosepine" title="Rosé Pine Dawn"   style="background:#faf4ed; color:#575279;">T</button>
          </div>
        </section>
        <section class="settings-section" style="margin-top: 20px;">
          <h3 data-i18n="settings.cloud.title">Google Drive</h3>
          <p class="settings-desc" data-i18n="settings.cloud.desc">
            填入 Google OAuth 2.0 Client ID 以啟用 Google Drive 功能。
          </p>
          <div class="settings-field">
            <label for="input-client-id" data-i18n="settings.cloud.clientId">Google Client ID</label>
            <span id="settings-client-id-status" class="settings-status status-warn">⚠ 尚未設定</span>
          </div>
          <input
            type="text"
            id="input-client-id"
            class="settings-input"
            data-i18n-placeholder="settings.cloud.placeholder"
            placeholder="貼上你的 Google OAuth 2.0 Client ID"
            autocomplete="off"
            spellcheck="false"
          >
          <p class="settings-hint" data-i18n="settings.cloud.hint">設定後需重新整理頁面以套用</p>
          <a
            class="settings-link"
            href="https://console.cloud.google.com/apis/credentials"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="settings.cloud.help"
          >📖 如何取得 Client ID？</a>
        </section>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-settings-cancel" data-i18n="settings.cancel">取消</button>
        <button class="btn-primary" id="btn-apply-theme" data-i18n="settings.theme.apply">套用配色</button>
        <button class="btn-primary" id="btn-settings-save" data-i18n="settings.save">儲存設定</button>
      </div>
      <div class="modal-version">v2026-03-13.1</div>
    </div>
  </div>

  <!-- Vendor JS -->
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/mermaid.min.js"></script>
  <script src="vendor/easymde.min.js"></script>
  <!-- App JS -->
  <script src="js/i18n.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/app.js"></script>

  <!-- Outline backdrop (mobile bottom sheet) -->
  <div id="outline-backdrop" class="outline-backdrop"></div>

  <!-- PWA service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
